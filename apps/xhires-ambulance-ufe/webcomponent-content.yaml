apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: xhires-ambulance-ufe-content
spec:
  microFrontend: xhires-ambulance-ufe
  element: xhires-ambulance-wl-app
  attributes:
  - name: api-base
    value: http://localhost:5000/api
  - name: ambulance-id
    value: bobulova
  - name: base-path
    value: ./xhires-ambulance-wl/
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?xhires-ambulance-wl(/.*)?$"